  :root{
    --yell50:#fff7ed; --yell100:#ffedd5; --yell200:#fed7aa; --yell300:#fdba74;
    --yell400:#fb923c; --yell500:#f97316; --yell600:#ea580c; --yell700:#c2410c;
    --ember100:#fee2e2; --ember400:#f87171; --ember500:#ef4444; --ember600:#dc2626;
    --warmbg:#faf6f2; --card:#ffffff; --border:#f0e6dd;
    --ink:#1f2937; --ink2:#4b5563; --mut:#9ca3af; --mut2:#d1d5db;
    --emerald100:#d1fae5; --emerald500:#10b981; --emerald600:#059669; --emerald700:#047857;
    --violet100:#ede9fe; --violet600:#7c3aed; --violet700:#6d28d9;
    --grad:linear-gradient(135deg,#f97316 0%,#ef4444 100%);
    --gradsoft:linear-gradient(135deg,#ffedd5 0%,#fee2e2 100%);
    --shadow:0 2px 12px rgba(234,88,12,.07);
    --shadow2:0 8px 30px rgba(0,0,0,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:ui-sans-serif,system-ui,"Hiragino Kaku Gothic ProN","Hiragino Sans","Meiryo",sans-serif;
    background:#e7ded6;
    color:var(--ink);
    background-image:radial-gradient(circle at 20% 10%,#f4ece4 0,transparent 45%),radial-gradient(circle at 90% 90%,#efe5db 0,transparent 40%);
    min-height:100vh;
    display:flex; justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .frame{
    position:relative; display:flex; flex-direction:column;
    width:100%; max-width:430px; min-height:100vh; background:var(--warmbg);
    overflow:hidden;
  }
  @media (min-width:480px){
    body{padding:24px 0;}
    .frame{min-height:calc(100vh - 48px); max-height:920px; border-radius:32px;
      box-shadow:var(--shadow2); border:1px solid var(--border);}
  }
  .topbar{
    position:sticky; top:0; z-index:30; height:56px;
    display:flex; align-items:center; justify-content:space-between; padding:0 16px;
    background:rgba(255,255,255,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--border);
  }
  .logo{display:flex;align-items:center;gap:6px;cursor:pointer;}
  .logo .lg{font-size:20px;}
  .logo b{font-weight:800;font-size:15px;letter-spacing:-.01em;}
  .logo .o{color:var(--yell600);} .logo .r{color:var(--ember600);}
  .top-right{display:flex;align-items:center;gap:8px;}
  .switch{display:flex;background:var(--warmbg);border:1px solid var(--border);border-radius:999px;padding:2px;}
  .switch button{border:0;background:transparent;font-size:11px;font-weight:700;padding:5px 9px;border-radius:999px;color:var(--mut);cursor:pointer;}
  .switch button.on-active{background:var(--emerald500);color:#fff;}
  .switch button.on-ob{background:var(--grad);color:#fff;}
  .bell{position:relative;width:36px;height:36px;border-radius:999px;display:grid;place-items:center;border:0;background:transparent;cursor:pointer;font-size:18px;}
  .bell:hover{background:var(--warmbg);}
  .badge-dot{position:absolute;top:5px;right:5px;min-width:16px;height:16px;padding:0 3px;border-radius:999px;background:var(--ember500);color:#fff;font-size:9px;font-weight:800;display:grid;place-items:center;}
  .main{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:16px;}
  .main::-webkit-scrollbar{display:none;} .main{scrollbar-width:none;}
  .bottomnav{position:sticky;bottom:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--border);display:flex;}
  .bottomnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;color:var(--mut);cursor:pointer;text-decoration:none;}
  .bottomnav a.on{color:var(--ember600);}
  .bottomnav .ic{font-size:20px;line-height:1;}
  .bottomnav .lb{font-size:10px;font-weight:600;}

  .page{padding:16px;}
  .stack{display:flex;flex-direction:column;}
  .gap3>*+*{margin-top:12px;} .gap4>*+*{margin-top:16px;} .gap5>*+*{margin-top:20px;} .gap2>*+*{margin-top:8px;}
  .row{display:flex;align-items:center;} .between{justify-content:space-between;}
  .h1{font-size:18px;font-weight:800;margin:0;}
  .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:14px;}
  .muted{color:var(--mut);} .small{font-size:11px;} .xs{font-size:10px;}
  .sec-title{display:flex;align-items:center;gap:6px;font-size:16px;font-weight:800;margin:0 0 12px;}
  .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .link{color:var(--yell600);font-weight:700;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:2px;text-decoration:none;}
  .btn{border:0;cursor:pointer;font-weight:800;border-radius:999px;font-family:inherit;}
  .btn-grad{background:var(--grad);color:#fff;box-shadow:var(--shadow);}
  .btn-block{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;font-size:14px;}
  .btn:active{transform:scale(.96);}
  .btn[disabled]{opacity:1;background:#f3f4f6;color:#9ca3af;cursor:default;box-shadow:none;}
  .pill{border:0;background:var(--warmbg);color:var(--mut);font-weight:700;border-radius:999px;cursor:pointer;font-family:inherit;}
  .iconbtn{width:32px;height:32px;border-radius:999px;display:grid;place-items:center;border:0;background:transparent;cursor:pointer;font-size:16px;}
  .iconbtn:hover{background:#fff;}
  .grad{background:var(--grad);color:#fff;}
  .gradsoft{background:var(--gradsoft);}
  .avatar{flex:none;border-radius:999px;background:var(--warmbg);border:1px solid var(--border);display:grid;place-items:center;user-select:none;}
  .av-sm{width:32px;height:32px;font-size:15px;} .av-md{width:40px;height:40px;font-size:20px;} .av-lg{width:56px;height:56px;font-size:26px;}
  .ring-ob{box-shadow:0 0 0 2px var(--yell300);} .ring-active{box-shadow:0 0 0 2px #6ee7b7;}
  .rbadge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:999px;}
  .rbadge.ob{background:var(--yell100);color:var(--yell700);}
  .rbadge.active{background:var(--emerald100);color:var(--emerald700);}
  .chip{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:3px;}
  .progress{height:8px;width:100%;border-radius:999px;background:var(--warmbg);overflow:hidden;}
  .progress>i{display:block;height:100%;border-radius:999px;background:var(--grad);transition:width .5s;}
  .progress.ondark{background:rgba(255,255,255,.25);}
  .progress.ondark>i{background:#fff;}
  .media{border-radius:14px;position:relative;display:grid;place-items:center;color:#fff;overflow:hidden;}
  .media .em{font-size:40px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));}
  .media .ph{position:absolute;bottom:6px;right:8px;font-size:9px;font-weight:800;letter-spacing:.08em;color:rgba(255,255,255,.85);}

  .hero{border-radius:16px;padding:16px;color:#fff;box-shadow:var(--shadow);}
  .hero-stat{flex:1;text-align:center;}
  .hero-stat b{font-size:16px;font-weight:800;display:block;} .hero-stat span{font-size:10px;opacity:.85;}

  .ql{flex:1;background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:12px;display:flex;flex-direction:column;gap:4px;cursor:pointer;text-decoration:none;color:inherit;}
  .ql:active{transform:scale(.96);}
  .ql .ic{font-size:20px;} .ql .lb{font-size:13px;font-weight:800;} .ql .sub{font-size:10px;color:var(--mut);}

  textarea,input[type=text],input[type=number]{font-family:inherit;width:100%;border:1px solid var(--border);border-radius:12px;padding:10px;font-size:13px;background:var(--warmbg);resize:none;outline:none;}
  textarea:focus,input:focus{border-color:var(--yell300);background:#fff;}
  .cat-pill,.emoji-pill{font-size:12px;font-weight:700;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:var(--warmbg);color:var(--ink2);cursor:pointer;font-family:inherit;}
  .cat-pill.sel{background:var(--grad);color:#fff;border-color:transparent;}
  .emoji-pill{font-size:18px;padding:4px 8px;}
  .emoji-pill.sel{background:var(--yell100);border-color:var(--yell300);}

  .note{display:flex;gap:8px;align-items:flex-start;border-radius:12px;background:var(--yell50);border:1px solid var(--yell100);padding:12px;font-size:11px;color:var(--yell700);line-height:1.6;}

  .overlay{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;animation:fade .2s ease;}
  .sheet{width:100%;max-width:430px;background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 28px;text-align:center;animation:slideup .28s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes slideup{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
  .check{width:64px;height:64px;border-radius:999px;background:var(--emerald500);color:#fff;font-size:32px;display:grid;place-items:center;margin:0 auto 14px;animation:pop .35s ease;}
  .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .grow{flex:1;min-width:0;}
</style>
</head>

/* ---------- ヘルパー ---------- */
const NOW=new Date("2026-06-21T12:00:00+09:00").getTime();
const WD=["日","月","火","水","木","金","土"];
const yen=(n)=>"¥"+Number(n).toLocaleString("ja-JP");
function fmtDT(iso){const d=new Date(iso);const h=String(d.getHours()).padStart(2,"0");const m=String(d.getMinutes()).padStart(2,"0");return `${d.getMonth()+1}月${d.getDate()}日(${WD[d.getDay()]}) ${h}:${m}`;}
function fmtD(iso){const d=new Date(iso);return `${d.getMonth()+1}/${d.getDate()}(${WD[d.getDay()]})`;}
function timeAgo(iso){const diff=NOW-new Date(iso).getTime();const min=Math.floor(diff/60000);if(min<1)return"たった今";if(min<60)return min+"分前";const hr=Math.floor(min/60);if(hr<24)return hr+"時間前";const day=Math.floor(hr/24);if(day<7)return day+"日前";return fmtD(iso);}
const isPast=(iso)=>new Date(iso).getTime()<NOW;
function esc(s){return String(s).replace(/[&<>"']/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

const RANK_TH={bronze:0,silver:30000,gold:70000};
const RANK_META={
  bronze:{label:"ブロンズ",emoji:"🥉",grad:"linear-gradient(135deg,#d97706,#b45309)"},
  silver:{label:"シルバー",emoji:"🥈",grad:"linear-gradient(135deg,#cbd5e1,#64748b)"},
  gold:{label:"ゴールド",emoji:"🥇",grad:"linear-gradient(135deg,#fde047,#f59e0b)"},
};
function rankInfo(total){
  let rank="bronze";
  if(total>=RANK_TH.gold)rank="gold"; else if(total>=RANK_TH.silver)rank="silver";
  let nextRank=null,nextTh=null;
  if(rank==="bronze"){nextRank="silver";nextTh=RANK_TH.silver;}
  else if(rank==="silver"){nextRank="gold";nextTh=RANK_TH.gold;}
  return {rank,...RANK_META[rank],nextRank,nextTh,remaining:nextTh!=null?Math.max(0,nextTh-total):null};
}

/* ---------- イベント ---------- */
function go(route){state.route=route;document.getElementById("main").scrollTop=0;render();window.scrollTo(0,0);}

document.addEventListener("click",(e)=>{
  const el=e.target.closest("[data-action]");
  if(!el)return;
  const a=el.dataset.action;
  // 親要素のnav(カード全体クリック)を止めたい子ボタン
  if(el.dataset.stop) e.stopPropagation();

  switch(a){
    case "nav": go(el.dataset.route); break;
    case "setRole":{
      state.role=el.dataset.role; localStorage.setItem(ROLE_KEY,state.role);
      // フォーム下書きはロール跨ぎでリセット
      render(); break;
    }
    case "like":{
      e.stopPropagation();
      const id=el.dataset.id; const p=state.posts.find(x=>x.id===id);
      if(state.liked.has(id)){state.liked.delete(id);p.likeCount--;}else{state.liked.add(id);p.likeCount++;}
      render(); break;
    }
    case "toggleComments":{
      e.stopPropagation();
      const id=el.dataset.id;
      if(state.openComments.has(id))state.openComments.delete(id); else state.openComments.add(id);
      render();
      if(state.openComments.has(id)){const i=document.getElementById("ci-"+id);if(i)i.focus();}
      break;
    }
    case "addComment":{
      e.stopPropagation();
      const id=el.dataset.id; const inp=document.getElementById("ci-"+id);
      const v=(inp&&inp.value||"").trim(); if(!v)return;
      const p=state.posts.find(x=>x.id===id); const u=currentUser();
      p.comments.push({id:newId("c"),authorName:u.name,authorAvatar:u.avatar,authorRole:u.role,body:v,createdAt:new Date().toISOString()});
      render(); break;
    }
    case "pickCat":{ state.draftCat=el.dataset.cat;
      document.querySelectorAll(".cat-pill").forEach(x=>x.classList.toggle("sel",x.dataset.cat===state.draftCat)); break; }
    case "pickEmoji":{
      const em=el.dataset.emoji; state.draftEmoji=(state.draftEmoji===em?"":em);
      document.querySelectorAll(".emoji-pill").forEach(x=>x.classList.toggle("sel",x.dataset.emoji===state.draftEmoji)); break; }
    case "addPost":{
      const ta=document.getElementById("np-text"); const v=(ta&&ta.value||"").trim(); if(!v)return;
      const u=currentUser();
      state.posts.unshift({id:newId("post"),authorName:u.name,authorAvatar:u.avatar,authorRole:u.role,createdAt:new Date().toISOString(),category:state.draftCat,body:v,imageEmoji:state.draftEmoji||"",imageBg:"brand",likeCount:0,comments:[]});
      state.draftEmoji=""; render(); break;
    }
    case "supportItem":{
      const id=el.dataset.id; const w=state.wishlist.find(x=>x.id===id);
      if(w.funded>=w.needed)return;
      w.funded=Math.min(w.needed,w.funded+1);
      state.donations.unshift({id:newId("don"),date:new Date().toISOString(),type:"物品支援",label:w.name,emoji:w.emoji,amount:w.price});
      state.modal={label:w.name,emoji:w.emoji,amount:w.price,kind:"物品支援"}; render(); break;
    }
    case "donate":{
      const amt=Number(el.dataset.amount);
      state.donations.unshift({id:newId("don"),date:new Date().toISOString(),type:"金額支援",label:"金額支援",emoji:"💴",amount:amt});
      state.modal={label:"金額支援",emoji:"💴",amount:amt,kind:"金額支援"}; render(); break;
    }
    case "donateFree":{
      const inp=document.getElementById("don-free"); const amt=Math.floor(Number(inp&&inp.value)); if(!amt||amt<1)return;
      state.donations.unshift({id:newId("don"),date:new Date().toISOString(),type:"金額支援",label:"金額支援",emoji:"💴",amount:amt});
      state.modal={label:"金額支援",emoji:"💴",amount:amt,kind:"金額支援"}; render(); break;
    }
    case "watch":{
      e.stopPropagation();
      const id=el.dataset.id;
      if(state.watched.has(id))state.watched.delete(id); else state.watched.add(id);
      render(); break;
    }
    case "joinEvent":{
      const id=el.dataset.id; const ev=state.events.find(x=>x.id===id);
      ev.joined=!ev.joined; ev.participants+=ev.joined?1:-1; render(); break;
    }
    case "boardTab":{ state.boardTab=el.dataset.board; render(); break; }
    case "closeModal":{
      // 背景（overlay）クリックは、背景自身をクリックした時のみ閉じる（シート内クリックでは閉じない）
      if(el.classList.contains("overlay") && e.target!==el) break;
      state.modal=null; render(); break;
    }
    case "demo": break;
  }
});

render();
</script>
</body>
</html>
