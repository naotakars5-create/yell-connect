<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#f97316" />
<title>エールコネクト | 部活動支援プラットフォーム</title>
<style>
  :root{
    --yell50:#fff7ed; --yell100:#ffedd5; --yell200:#fed7aa; --yell300:#fdba74;
    --yell400:#fb923c; --yell500:#f97316; --yell600:#ea580c; --yell700:#9a3412;
    --ember100:#fee2e2; --ember400:#f87171; --ember500:#ef4444; --ember600:#dc2626;
    --warmbg:#eef0f6; --card:#ffffff; --border:#e8ebf2;
    --ink:#0f172a; --ink2:#3a475c; --mut:#6b7688; --mut2:#cbd5e1;
    --emerald100:#d1fae5; --emerald500:#10b981; --emerald600:#059669; --emerald700:#047857;
    --violet100:#ede9fe; --violet600:#7c3aed; --violet700:#6d28d9;
    --grad:linear-gradient(135deg,#fb923c 0%,#fa6c43 48%,#f43f5e 100%);
    --gradsoft:linear-gradient(135deg,#fff1e3 0%,#ffe3e6 100%);
    --shadow:0 1px 2px rgba(15,23,42,.04),0 10px 26px -10px rgba(30,41,59,.18);
    --shadowlg:0 12px 34px -8px rgba(30,41,59,.26);
    --shadow2:0 24px 60px -10px rgba(0,0,0,.38);
    --rad:20px; --radlg:26px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Inter","SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI Variable","Segoe UI",ui-sans-serif,system-ui,"Hiragino Kaku Gothic ProN","Hiragino Sans","Meiryo",sans-serif;
    background:#c4ccd9;
    color:var(--ink);
    background-image:radial-gradient(900px 500px at 12% -5%,#e6ddf3 0,transparent 55%),radial-gradient(800px 600px at 105% 105%,#ffe2d6 0,transparent 50%),linear-gradient(180deg,#cdd4e1,#c2cad8);
    min-height:100vh;
    display:flex; justify-content:center;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    font-size:15px; line-height:1.5;
  }
  .frame{
    position:relative; display:flex; flex-direction:column;
    width:100%; max-width:430px; min-height:100vh; background:var(--warmbg);
    background-image:radial-gradient(700px 380px at 50% -8%,#fff 0,transparent 60%);
    overflow:hidden;
  }
  @media (min-width:480px){
    body{padding:26px 0;}
    .frame{min-height:calc(100vh - 52px); max-height:924px; border-radius:42px;
      box-shadow:var(--shadow2); border:1px solid rgba(255,255,255,.7);}
  }
  .topbar{
    position:sticky; top:0; z-index:30; height:58px;
    display:flex; align-items:center; justify-content:space-between; padding:0 14px;
    background:rgba(255,255,255,.7); backdrop-filter:saturate(1.8) blur(18px); -webkit-backdrop-filter:saturate(1.8) blur(18px); border-bottom:1px solid rgba(226,230,238,.7);
  }
  .logo{display:flex;align-items:center;gap:7px;cursor:pointer;}
  .logo .lg{font-size:22px;}
  .logo b{font-weight:900;font-size:16px;letter-spacing:-.01em;}
  .logo .o{color:var(--yell600);} .logo .r{color:var(--ember600);}
  .top-right{display:flex;align-items:center;gap:8px;}
  .switch{display:flex;background:var(--warmbg);border:1px solid var(--border);border-radius:999px;padding:3px;}
  .switch button{border:0;background:transparent;font-size:11.5px;font-weight:800;padding:6px 11px;border-radius:999px;color:var(--ink2);cursor:pointer;transition:.15s;}
  .switch button.on-active{background:var(--emerald500);color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.4);}
  .switch button.on-ob{background:var(--grad);color:#fff;box-shadow:0 2px 8px rgba(244,63,94,.35);}
  .bell{position:relative;width:38px;height:38px;border-radius:999px;display:grid;place-items:center;border:0;background:var(--warmbg);cursor:pointer;font-size:18px;}
  .bell:hover{background:#e6eaf2;}
  .badge-dot{position:absolute;top:3px;right:3px;min-width:17px;height:17px;padding:0 3px;border-radius:999px;background:var(--ember500);color:#fff;font-size:9.5px;font-weight:800;display:grid;place-items:center;border:2px solid #fff;}
  .main{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:96px;}
  .main::-webkit-scrollbar{display:none;} .main{scrollbar-width:none;}
  .bottomnav{position:absolute;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:30;display:flex;padding:6px;border-radius:24px;
    background:rgba(255,255,255,.72);backdrop-filter:saturate(1.8) blur(22px);-webkit-backdrop-filter:saturate(1.8) blur(22px);
    border:1px solid rgba(255,255,255,.85);box-shadow:var(--shadowlg);}
  .bottomnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;color:var(--mut);cursor:pointer;text-decoration:none;font-weight:700;position:relative;border-radius:16px;transition:.18s;}
  .bottomnav a.on{color:var(--ember600);background:linear-gradient(180deg,rgba(251,146,60,.14),rgba(244,63,94,.1));}
  .bottomnav a.on .ic{transform:translateY(-1px) scale(1.06);}
  .bottomnav .ic{font-size:21px;line-height:1;transition:.18s;}
  .bottomnav .lb{font-size:10.5px;font-weight:800;}

  .page{padding:16px;}
  .stack{display:flex;flex-direction:column;}
  .gap3>*+*{margin-top:12px;} .gap4>*+*{margin-top:16px;} .gap5>*+*{margin-top:22px;} .gap2>*+*{margin-top:8px;}
  .row{display:flex;align-items:center;} .between{justify-content:space-between;}
  .h1{font-size:22px;font-weight:900;margin:0;letter-spacing:-.03em;}
  .card{background:var(--card);border-radius:var(--rad);box-shadow:var(--shadow);padding:16px;border:1px solid var(--border);transition:box-shadow .2s,transform .12s;}
  .card[data-action]{cursor:pointer;}
  .card[data-action]:hover{box-shadow:var(--shadowlg);}
  .card[data-action]:active{transform:scale(.99);}
  .muted{color:var(--mut);} .small{font-size:12.5px;} .xs{font-size:11px;}
  .sec-title{display:flex;align-items:center;gap:6px;font-size:17px;font-weight:900;margin:0;letter-spacing:-.01em;}
  .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .link{color:var(--yell600);font-weight:800;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:2px;text-decoration:none;}
  .btn{border:0;cursor:pointer;font-weight:800;border-radius:15px;font-family:inherit;transition:transform .1s,box-shadow .15s,filter .15s;}
  .btn-grad{background:var(--grad);color:#fff;box-shadow:0 6px 18px -4px rgba(244,63,94,.5);}
  .btn-grad:hover{box-shadow:0 10px 24px -6px rgba(244,63,94,.6);filter:brightness(1.03);}
  .btn-block{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:14px;font-size:14.5px;}
  .btn:active{transform:scale(.97);}
  .btn[disabled]{opacity:1;background:#eef1f6;color:#94a3b8;cursor:default;box-shadow:none;}
  .pill{border:1px solid var(--border);background:#fff;color:var(--ink2);font-weight:800;border-radius:999px;cursor:pointer;font-family:inherit;transition:.15s;}
  .pill:hover{border-color:var(--mut2);}
  .iconbtn{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;border:0;background:var(--warmbg);cursor:pointer;font-size:17px;color:var(--ink2);}
  .iconbtn:hover{background:#e6eaf2;}
  .grad{background:var(--grad);color:#fff;}
  .gradsoft{background:var(--gradsoft);}
  .avatar{flex:none;border-radius:999px;background:var(--warmbg);border:1px solid var(--border);display:grid;place-items:center;user-select:none;position:relative;overflow:hidden;}
  .avatar .face{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
  .photo-tile{position:relative;overflow:hidden;background:var(--warmbg);}
  .photo-tile .face{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
  .photo-tile>span{position:relative;z-index:0;}
  .av-sm{width:34px;height:34px;font-size:16px;} .av-md{width:42px;height:42px;font-size:21px;} .av-lg{width:56px;height:56px;font-size:26px;}
  .ring-ob{box-shadow:0 0 0 2px var(--yell400);} .ring-active{box-shadow:0 0 0 2px var(--emerald500);}
  .rbadge{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;}
  .rbadge.ob{background:var(--yell100);color:var(--yell700);}
  .rbadge.active{background:var(--emerald100);color:var(--emerald700);}
  .chip{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:3px;}
  .progress{height:9px;width:100%;border-radius:999px;background:#e6eaf2;overflow:hidden;}
  .progress>i{display:block;height:100%;border-radius:999px;background:var(--grad);transition:width .5s;}
  .progress.ondark{background:rgba(255,255,255,.3);}
  .progress.ondark>i{background:#fff;}
  .media{border-radius:16px;position:relative;display:grid;place-items:center;color:#fff;overflow:hidden;}
  .media .em{font-size:40px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));}
  .media .ph{position:absolute;bottom:6px;right:8px;font-size:9px;font-weight:800;letter-spacing:.08em;color:rgba(255,255,255,.85);}

  .hero{position:relative;border-radius:var(--radlg);padding:20px;color:#fff;box-shadow:0 14px 34px -10px rgba(244,63,94,.5);overflow:hidden;}
  .hero::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 0% 0%,rgba(255,255,255,.35),transparent 55%);pointer-events:none;mix-blend-mode:soft-light;z-index:0;}
  .hero-stat{flex:1;text-align:center;}
  .hero-stat b{font-size:18px;font-weight:900;display:block;} .hero-stat span{font-size:10.5px;opacity:.9;}

  .ql{flex:1;background:var(--card);border-radius:var(--rad);box-shadow:var(--shadow);border:1px solid var(--border);padding:15px;display:flex;flex-direction:column;gap:4px;cursor:pointer;text-decoration:none;color:inherit;transition:transform .14s,box-shadow .2s;}
  .ql:hover{box-shadow:var(--shadowlg);transform:translateY(-2px);}
  .ql:active{transform:scale(.97);}
  .ql .ic{font-size:24px;} .ql .lb{font-size:13.5px;font-weight:900;} .ql .sub{font-size:11px;color:var(--mut);}

  textarea,input[type=text],input[type=number]{font-family:inherit;width:100%;border:1.5px solid var(--border);border-radius:13px;padding:11px 12px;font-size:14px;background:#fbfcfe;resize:none;outline:none;color:var(--ink);transition:.15s;}
  textarea::placeholder,input::placeholder{color:var(--mut2);}
  textarea:focus,input:focus{border-color:var(--yell400);background:#fff;box-shadow:0 0 0 3px rgba(251,146,60,.15);}
  .cat-pill,.emoji-pill{font-size:12.5px;font-weight:800;padding:7px 12px;border-radius:999px;border:1.5px solid var(--border);background:#fff;color:var(--ink2);cursor:pointer;font-family:inherit;transition:.12s;}
  .cat-pill.sel{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(244,63,94,.3);}
  .emoji-pill{font-size:19px;padding:5px 9px;}
  .emoji-pill.sel{background:var(--yell100);border-color:var(--yell400);}

  .note{display:flex;gap:8px;align-items:flex-start;border-radius:14px;background:var(--yell50);border:1px solid var(--yell200);padding:13px;font-size:12px;color:var(--yell700);line-height:1.65;}

  .overlay{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;animation:fade .2s ease;}
  .sheet{width:100%;max-width:430px;background:#fff;border-radius:28px 28px 0 0;padding:26px 20px 30px;text-align:center;animation:slideup .28s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes slideup{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
  .check{width:64px;height:64px;border-radius:999px;background:var(--emerald500);color:#fff;font-size:32px;display:grid;place-items:center;margin:0 auto 14px;animation:pop .35s ease;}
  .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .grow{flex:1;min-width:0;}
  /* 画面遷移アニメーション（ルート変更時のみ） */
  @keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .main.enter>.page{animation:pageIn .36s cubic-bezier(.2,.75,.2,1);}
  @media (prefers-reduced-motion:reduce){.main.enter>.page{animation:none;}}

  /* 実写真（読み込み失敗時は背後の絵文字＋グラデにフォールバック） */
  .media .cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:inherit;z-index:1;}
  .media .em{position:relative;z-index:0;}
  .hero{position:relative;overflow:hidden;}
  .hero>*{position:relative;z-index:1;}
  .hero .herobg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.30;z-index:0;}
  /* トースト通知 */
  .toast{position:absolute;left:50%;bottom:104px;transform:translateX(-50%);z-index:60;background:rgba(15,23,42,.94);backdrop-filter:blur(8px);color:#fff;font-size:12.5px;font-weight:700;padding:12px 18px;border-radius:16px;box-shadow:var(--shadow2);max-width:88%;text-align:center;line-height:1.5;animation:toastin .25s ease;}
  @keyframes toastin{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
  /* 検索バー */
  .search{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);border-radius:999px;padding:11px 16px;box-shadow:var(--shadow);}
  .search input{border:0;background:transparent;padding:0;font-size:14px;flex:1;border-radius:0;}
  .search input:focus{background:transparent;box-shadow:none;}
  .search:focus-within{border-color:var(--yell400);box-shadow:0 0 0 3px rgba(251,146,60,.15);}
  /* 探す：コミュニティカード */
  .cm{background:var(--card);border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;}
  .cm .banner{position:relative;height:110px;background:var(--grad);}
  .cm .banner .cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .cm .banner .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.02),rgba(0,0,0,.5));}
  .cm .banner .typ{position:absolute;top:8px;left:8px;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.94);display:grid;place-items:center;font-size:19px;box-shadow:var(--shadow);}
  .cm .banner .nm{position:absolute;left:12px;right:12px;bottom:8px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5);}
  .statebadge{font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:999px;flex:none;}
  .req{display:flex;align-items:center;gap:10px;background:var(--warmbg);border-radius:13px;padding:10px 11px;}
  .seg{display:flex;gap:6px;flex-wrap:wrap;}

  /* ===== 新機能スタイル ===== */
  /* 年間目標サーモメーター */
  .thermo .barwrap{position:relative;height:14px;border-radius:999px;background:#e6eaf2;overflow:hidden;}
  .thermo .barwrap>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#fb923c,#f43f5e);transition:width .7s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 12px rgba(244,63,94,.4);}
  /* ランキング */
  .lbrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:15px;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);}
  .lbrow.me{border-color:var(--yell400);box-shadow:0 0 0 1px var(--yell400),var(--shadow);background:var(--yell50);}
  .lbrank{width:30px;flex:none;text-align:center;font-size:18px;font-weight:900;color:var(--mut);}
  .lbrank.top{font-size:22px;}
  /* セグメントタブ（現代化した pill タブ） */
  .tabs{display:flex;gap:6px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:5px;box-shadow:var(--shadow);}
  .tabs button{flex:1;border:0;background:transparent;font-family:inherit;font-size:12.5px;font-weight:800;padding:9px 0;border-radius:10px;color:var(--mut);cursor:pointer;transition:.15s;}
  .tabs button.on{background:var(--grad);color:#fff;box-shadow:0 3px 10px rgba(244,63,94,.3);}
  /* フィルターチップ（横スクロール） */
  .filterbar{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-ms-overflow-style:none;scrollbar-width:none;}
  .filterbar::-webkit-scrollbar{display:none;}
  .fchip{flex:none;border:1.5px solid var(--border);background:#fff;color:var(--ink2);font-weight:800;font-size:12.5px;padding:7px 14px;border-radius:999px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.12s;}
  .fchip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  /* 感謝の声 / メッセージ吹き出し */
  .thanks{display:flex;gap:9px;align-items:flex-start;background:var(--emerald100);border:1px solid #a7f3d0;border-radius:14px;padding:11px 12px;}
  .thanks .body{font-size:12.5px;color:#065f46;line-height:1.55;}
  /* 統計の大きい数字 */
  .bignum{font-size:26px;font-weight:900;letter-spacing:-.02em;line-height:1;}
  /* 支援者アバタースタック */
  .stack-av{display:flex;}
  .stack-av .a{width:26px;height:26px;border-radius:999px;background:var(--warmbg);border:2px solid #fff;display:grid;place-items:center;font-size:13px;margin-left:-8px;}
  .stack-av .a:first-child{margin-left:0;}
  .divider{height:1px;background:var(--border);border:0;margin:0;}
</style>
</head>

  <div id="topbar"></div>
  <main class="main" id="main"></main>
  <nav class="bottomnav" id="bottomnav"></nav>
  <div id="modal-root"></div>
</div>

const WD=["日","月","火","水","木","金","土"];

function fmtDT(iso){const d=new Date(iso);const h=String(d.getHours()).padStart(2,"0");const m=String(d.getMinutes()).padStart(2,"0");return `${d.getMonth()+1}月${d.getDate()}日(${WD[d.getDay()]}) ${h}:${m}`;}
function fmtD(iso){const d=new Date(iso);return `${d.getMonth()+1}/${d.getDate()}(${WD[d.getDay()]})`;}
function timeAgo(iso){const diff=NOW-new Date(iso).getTime();const min=Math.floor(diff/60000);if(min<1)return"たった今";if(min<60)return min+"分前";const hr=Math.floor(min/60);if(hr<24)return hr+"時間前";const day=Math.floor(hr/24);if(day<7)return day+"日前";return fmtD(iso);}
const isPast=(iso)=>new Date(iso).getTime()<NOW;

function rankInfo(total){
  let rank="bronze";
  if(total>=RANK_TH.gold)rank="gold"; else if(total>=RANK_TH.silver)rank="silver";
  let nextRank=null,nextTh=null;
  if(rank==="bronze"){nextRank="silver";nextTh=RANK_TH.silver;}
  else if(rank==="silver"){nextRank="gold";nextTh=RANK_TH.gold;}
  return {rank,...RANK_META[rank],nextRank,nextTh,remaining:nextTh!=null?Math.max(0,nextTh-total):null};
}

/* ---------- 共通パーツ ---------- */
/* 人物の顔写真：名前をシードに決定論的な実写ポートレートを割り当て（失敗時は絵文字にフォールバック） */
const FEMALE=/美咲|さやか|由香|真央|葵|凛|花|香|子|恵|奈|愛/;
function face(seed){
  let h=0; for(let i=0;i<seed.length;i++){h=(h*31+seed.charCodeAt(i))>>>0;}
  const g=FEMALE.test(seed)?"women":"men";
  return `https://randomuser.me/api/portraits/${g}/${h%100}.jpg`;
}
/* seed（人名）を渡すと実写アバター、なければ絵文字アバター */
function avatar(emoji,role,size,seed){
  const ring=role==="ob"?"ring-ob":role==="active"?"ring-active":"";
  const img=seed?`<img class="face" src="${face(seed)}" alt="" loading="lazy" onerror="this.remove()">`:"";
  return `<div class="avatar av-${size||"md"} ${ring}">${emoji}${img}</div>`;
}
function progress(v,max,onDark){const pct=max===0?0:Math.min(100,Math.round((v/max)*100));return `<div class="progress ${onDark?"ondark":""}"><i style="width:${pct}%"></i></div>`;}
function media(emoji,bg,height){return `<div class="media" style="background:${grad(bg)};height:${height||120}px"><span class="em">${emoji}</span></div>`;}
/* 実写真：idがあればUnsplash画像を表示し、失敗時は背後の絵文字＋グラデにフォールバック */
const UNSPLASH="https://images.unsplash.com/photo-";
const uimg=(id,w)=>UNSPLASH+id+"?auto=format&fit=crop&w="+(w||800)+"&q=70";
function photo(id,emoji,bg,height,radius){
  const h=height||140, r=(radius==null?14:radius);
  const box=`background:${grad(bg)};height:${h}px;border-radius:${r}px`;
  if(!id) return `<div class="media" style="${box}"><span class="em">${emoji||"📷"}</span></div>`;
  return `<div class="media" style="${box}"><span class="em">${emoji||"📷"}</span><img class="cover" src="${uimg(id)}" loading="lazy" alt="" onerror="this.remove()"></div>`;
}
function herobg(id){return id?`<img class="herobg" src="${uimg(id,1000)}" loading="lazy" alt="" onerror="this.remove()">`:"";}
function secHead(title,em,action){return `<div class="sec-head"><h2 class="sec-title">${em?em+" ":""}${title}</h2>${action||""}</div>`;}

        ${avatar(p.authorAvatar,p.authorRole,"md",p.authorName)}
        <div>
          <div class="row" style="gap:5px"><b style="font-size:13px">${esc(p.authorName)}</b><span class="rbadge ${p.authorRole}">${p.authorRole==="ob"?"OB/OG":"現役生"}</span></div>
          <div class="xs muted">${timeAgo(p.createdAt)}</div>
        </div>

      <span class="chip" style="${CAT_COLOR[p.category]}">${p.category}</span>
    </div>
    <div style="font-size:13px;line-height:1.7;margin:10px 0">${esc(p.body)}</div>
    ${(p.imageId||p.imageEmoji)?photo(p.imageId,p.imageEmoji,p.imageBg,170):""}

      <button class="pill" data-action="like" data-id="${p.id}" style="padding:6px 12px;${liked?"background:var(--ember100);color:var(--ember600)":""}">

/* ---------- イベント ---------- */
function go(route){
  state.route=route; render();
  const m=document.getElementById("main");
  m.scrollTop=0; window.scrollTo(0,0);
  // ルート変更時だけ軽い遷移アニメ（like等の再描画では発火しない）
  m.classList.remove("enter"); void m.offsetWidth; m.classList.add("enter");
  clearTimeout(go._t); go._t=setTimeout(()=>m.classList.remove("enter"),380);
}

/* 軽量トースト通知（モーダルを使わない確定フィードバック） */
let toastTimer=null;
function toast(msg){
  const f=document.querySelector(".frame");
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.className="toast";f.appendChild(t);}
  t.textContent=msg;
  t.style.animation="none"; void t.offsetWidth; t.style.animation="toastin .25s ease";
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{const el=document.getElementById("toast");if(el)el.remove();},2800);
}

document.addEventListener("click",(e)=>{
  const el=e.target.closest("[data-action]");
  if(!el)return;
  const a=el.dataset.action;
  // 親要素のnav(カード全体クリック)を止めたい子ボタン
  if(el.dataset.stop) e.stopPropagation();

  switch(a){
    case "nav":{
      // お知らせからの遷移は、その通知を既読にする
      if(el.dataset.nid){const n=notices.find(x=>x.id===el.dataset.nid);if(n)n.unread=false;}
      go(el.dataset.route); break;
    }
    case "readAll":{
      notices.forEach(n=>{if(n.audience==="all"||n.audience===state.role)n.unread=false;});
      render(); toast("すべてのお知らせを既読にしました。"); break;
    }
    case "setRole":{
      state.role=el.dataset.role; localStorage.setItem(ROLE_KEY,state.role);
      // 現役生にはOB専用画面（会費）を表示しない
      if(state.role==="active" && state.route==="dues") state.route="home";
      render(); break;
    }
    case "like":{
      e.stopPropagation();
      const id=el.dataset.id; const p=state.posts.find(x=>x.id===id);
      if(state.liked.has(id)){state.liked.delete(id);p.likeCount--;}else{state.liked.add(id);p.likeCount++;}
      render(); break;
    }
    case "toggleComments":{
      e.stopPropagation();
      const id=el.dataset.id;
      if(state.openComments.has(id))state.openComments.delete(id); else state.openComments.add(id);
      render();
      if(state.openComments.has(id)){const i=document.getElementById("ci-"+id);if(i)i.focus();}
      break;
    }
    case "addComment":{
      e.stopPropagation();
      const id=el.dataset.id; const inp=document.getElementById("ci-"+id);
      const v=(inp&&inp.value||"").trim(); if(!v)return;
      const p=state.posts.find(x=>x.id===id); const u=currentUser();
      p.comments.push({id:newId("c"),authorName:u.name,authorAvatar:u.avatar,authorRole:u.role,body:v,createdAt:new Date().toISOString()});
      render(); break;
    }
    case "pickCat":{ state.draftCat=el.dataset.cat;
      document.querySelectorAll(".cat-pill").forEach(x=>x.classList.toggle("sel",x.dataset.cat===state.draftCat)); break; }
    case "pickEmoji":{
      const em=el.dataset.emoji; state.draftEmoji=(state.draftEmoji===em?"":em);
      document.querySelectorAll(".emoji-pill").forEach(x=>x.classList.toggle("sel",x.dataset.emoji===state.draftEmoji)); break; }
    case "addPost":{
      const ta=document.getElementById("np-text"); const v=(ta&&ta.value||"").trim(); if(!v)return;
      const u=currentUser();
      state.posts.unshift({id:newId("post"),authorName:u.name,authorAvatar:u.avatar,authorRole:u.role,createdAt:new Date().toISOString(),category:state.draftCat,body:v,imageEmoji:state.draftEmoji||"",imageBg:"brand",likeCount:0,comments:[]});
      state.draftEmoji=""; render(); break;
    }
    case "supportItem":{
      const id=el.dataset.id; const w=state.wishlist.find(x=>x.id===id);
      if(w.funded>=w.needed)return;
      w.funded=Math.min(w.needed,w.funded+1);
      state.donations.unshift({id:newId("don"),date:new Date().toISOString(),type:"物品支援",label:w.name,emoji:w.emoji,amount:w.price});
      state.modal={label:w.name,emoji:w.emoji,amount:w.price,kind:"物品支援"}; render(); break;
    }
    case "donate":{
      const amt=Number(el.dataset.amount);
      state.donations.unshift({id:newId("don"),date:new Date().toISOString(),type:"金額支援",label:"金額支援",emoji:"💴",amount:amt});
      state.modal={label:"金額支援",emoji:"💴",amount:amt,kind:"金額支援"}; render(); break;
    }
    case "donateFree":{
      const inp=document.getElementById("don-free"); const amt=Math.floor(Number(inp&&inp.value)); if(!amt||amt<1)return;
      state.donations.unshift({id:newId("don"),date:new Date().toISOString(),type:"金額支援",label:"金額支援",emoji:"💴",amount:amt});
      state.modal={label:"金額支援",emoji:"💴",amount:amt,kind:"金額支援"}; render(); break;
    }
    case "watch":{
      e.stopPropagation();
      const id=el.dataset.id;
      if(state.watched.has(id))state.watched.delete(id); else state.watched.add(id);
      render(); break;
    }
    case "joinEvent":{
      const id=el.dataset.id; const ev=state.events.find(x=>x.id===id);
      ev.joined=!ev.joined; ev.participants+=ev.joined?1:-1; render(); break;
    }
    case "payDues":{
      e.stopPropagation();
      if(state.duesPaid)break;
      state.duesPaid=true;
      state.modal={title:"会費の納付が完了しました！",label:DUES.year+"年度 OB会 年会費",emoji:"🧾",amount:DUES.fee,kind:"年会費の納付"};
      render(); break;
    }
    case "duesReceipt":{ toast("領収書を発行しました（デモ）。登録メール宛に送信した想定です。"); break; }
    case "feedFilter":{ state.feedFilter=el.dataset.cat; render(); break; }
    case "likeComment":{
      e.stopPropagation();
      const id=el.dataset.id;
      if(state.commentLiked.has(id))state.commentLiked.delete(id); else state.commentLiked.add(id);
      render(); break;
    }
    case "boardTab":{ state.boardTab=el.dataset.board; render(); break; }
    case "pickWishP":{ state.wishPriority=el.dataset.p;
      document.querySelectorAll('[data-action="pickWishP"]').forEach(x=>x.classList.toggle("sel",x.dataset.p===state.wishPriority)); break; }
    case "pickWishE":{ state.wishEmoji=el.dataset.emoji;
      document.querySelectorAll('[data-action="pickWishE"]').forEach(x=>x.classList.toggle("sel",x.dataset.emoji===state.wishEmoji)); break; }
    case "addWish":{
      const nm=(((document.getElementById("wn")||{}).value)||"").trim();
      const reason=(((document.getElementById("wreason")||{}).value)||"").trim();
      const price=Math.floor(Number((document.getElementById("wprice")||{}).value));
      const needed=Math.floor(Number((document.getElementById("wneeded")||{}).value));
      if(!nm){ toast("品名を入力してください。"); break; }
      if(!price||price<1){ toast("単価（円）を入力してください。"); break; }
      if(!needed||needed<1){ toast("必要数を入力してください。"); break; }
      const bgs=["orange","yell","pink","sky","cyan","violet"];
      state.wishlist.unshift({id:newId("wish"),name:nm,emoji:state.wishEmoji,bg:bgs[state.wishlist.length%bgs.length],imageId:"",price,needed,funded:0,priority:state.wishPriority,reason:reason||"支援をお願いします。"});
      render(); toast("「"+nm+"」を欲しい物リストに追加しました！"); break;
    }
    case "toggleRegister":{ state.showRegister=!state.showRegister; render(); break; }
    case "regType":{ state.regType=el.dataset.emoji;
      document.querySelectorAll('[data-action="regType"]').forEach(x=>x.classList.toggle("sel",x.dataset.emoji===state.regType)); break; }
    case "registerCommunity":{
      const school=(((document.getElementById("rgschool")||{}).value)||"").trim();
      const cb=(((document.getElementById("rgclub")||{}).value)||"").trim();
      const pref=(((document.getElementById("rgpref")||{}).value)||"").trim()||"未設定";
      if(!school){ toast("学校名を入力してください。"); break; }
      if(!cb){ toast("部活動名を入力してください。"); break; }
      state.communities.unshift({id:newId("cm"),school,club:cb,pref,type:state.regType,photoId:"",members:1,since:new Date().getFullYear()+"年",host:currentUser().name+"（あなた）",you:"host",requests:[]});
      state.showRegister=false; state.discoverQuery=""; render();
      toast("「"+school+" "+cb+"」をホストとして登録しました🏅"); break;
    }
    case "applyJoin":{
      const c=state.communities.find(x=>x.id===el.dataset.id); if(!c)break;
      c.you="pending"; render(); toast("参加申請を送信しました。ホストの承認をお待ちください。"); break;
    }
    case "cancelApply":{
      const c=state.communities.find(x=>x.id===el.dataset.id); if(!c)break;
      c.you="none"; render(); toast("参加申請を取り消しました。"); break;
    }
    case "approveReq":{
      const c=state.communities.find(x=>x.id===el.dataset.id); if(!c)break;
      const r=(c.requests||[]).splice(Number(el.dataset.idx),1)[0]; if(r)c.members++;
      render(); toast((r?r.name:"申請者")+" さんの参加を承認しました🎉"); break;
    }
    case "rejectReq":{
      const c=state.communities.find(x=>x.id===el.dataset.id); if(!c)break;
      const r=(c.requests||[]).splice(Number(el.dataset.idx),1)[0];
      render(); toast((r?r.name:"申請")+" さんの申請を却下しました。"); break;
    }
    case "closeModal":{
      // 背景（overlay）クリックは、背景自身をクリックした時のみ閉じる（シート内クリックでは閉じない）
      if(el.classList.contains("overlay") && e.target!==el) break;
      state.modal=null; render(); break;
    }
    case "openThread":{ toast("スレッドの詳細・返信はデモ版では準備中です。"); break; }
    case "newThread":{ toast("スレッド作成はデモ版では準備中です。"); break; }
    case "demo": break;
  }
});

/* 検索の入力（画面全体を再描画せず結果のみ更新＝フォーカス維持） */
document.addEventListener("input",(e)=>{
  const el=e.target.closest("[data-action]"); if(!el)return;
  if(el.dataset.action==="discoverSearch"){
    state.discoverQuery=el.value;
    const box=document.getElementById("discover-results");
    if(box) box.innerHTML=discoverResults();
  }
});

render();
</script>
</body>
</html>
